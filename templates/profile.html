<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Profile - TrackPro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-gradient">
<nav class="navbar navbar-dark">
  <div class="container-fluid">
    <a class="navbar-brand" href="/">⚽ TrackPro</a>
    <a class="nav-link text-light" href="/">Dashboard</a>
    <a class="nav-link text-light" href="/leaderboard">Leaderboard</a>
  </div>
</nav>

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card glass animate-in" style="--delay:0.08s">
        <div class="card-body">
          <h3 class="card-title mb-3 animate-in" style="--delay:0.12s">Edit Profile</h3>
          <form method="POST" action="/profile" enctype="multipart/form-data">
            <div class="mb-3 d-flex align-items-center">
              {% if user and user.avatar_path %}
                <img src="/static/uploads/avatars/{{ user.avatar_path }}" class="me-3 rounded-circle" width="96" height="96" alt="avatar">
              {% else %}
                <div class="me-3 avatar-placeholder rounded-circle d-flex align-items-center justify-content-center" style="width:96px;height:96px;">⚽</div>
              {% endif %}
              <div>
                <label class="form-label small text-muted">Change avatar</label>
                <input class="form-control form-control-sm" type="file" name="avatar" accept="image/*">
                <div class="form-text small text-muted">PNG/JPG up to 2MB recommended.</div>
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label">Display name</label>
              <input type="text" name="display_name" class="form-control" value="{{ user.display_name or user.username }}">
            </div>
            <div class="mb-3">
              <label class="form-label">Bio</label>
              <textarea name="bio" class="form-control" rows="3">{{ user.bio or '' }}</textarea>
            </div>
            <div class="mb-3">
              <label class="form-label">New password</label>
              <input type="password" name="password" class="form-control" placeholder="Leave blank to keep current password">
            </div>
            <div class="mb-3">
              <label class="form-label">Confirm password</label>
              <input type="password" name="confirm_password" class="form-control" placeholder="Confirm new password">
            </div>
            <div class="d-flex gap-2">
              <button class="btn btn-primary" type="submit">Save profile</button>
              <a class="btn btn-outline-light" href="/">Cancel</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/js/ui-smooth.js" defer></script>
</body>
</html>
