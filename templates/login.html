<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TrackPro</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: 'Inter', sans-serif;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
}

/* background glow */

body::before{
content:"";
position:absolute;
width:600px;
height:600px;
background: radial-gradient(circle,rgba(255,255,255,0.12),transparent);
top:-200px;
right:-200px;
filter: blur(120px);
}

/* login card */

.login-card{

width:360px;
padding:40px;

border-radius:22px;

background: rgba(255,255,255,0.06);

backdrop-filter: blur(30px);
-webkit-backdrop-filter: blur(30px);

border:1px solid rgba(255,255,255,0.1);

box-shadow:
0 10px 40px rgba(0,0,0,0.5),
inset 0 1px rgba(255,255,255,0.1);

}

/* title */

.title{

font-size:28px;
font-weight:600;
text-align:center;
margin-bottom:25px;

}

/* select box */

.select-box{

width:100%;
padding:12px 14px;

border-radius:12px;

border:1px solid rgba(255,255,255,0.15);

background: rgba(255,255,255,0.05);

color:white;

outline:none;

transition:0.25s;
}

.select-box:hover{
background: rgba(255,255,255,0.08);
}

.select-box:focus{
border-color:#4da3ff;
}

/* button */

.login-btn{

margin-top:20px;

width:100%;
padding:12px;

border:none;

border-radius:12px;

font-weight:500;
font-size:15px;

cursor:pointer;

background: linear-gradient(135deg,#4da3ff,#0066ff);

color:white;

transition:0.25s;
}

.login-btn:hover{

transform: translateY(-1px);

box-shadow:0 8px 18px rgba(0,0,0,0.4);

}

/* small text */

.footer{

margin-top:20px;
text-align:center;
font-size:13px;
opacity:0.6;

}

</style>
</head>

<body>

<div class="login-card">

<div class="title">
TrackPro
</div>

<form method="POST" action="/login">

<select class="select-box" name="username">

<option>Akshit</option>
<option>Misha</option>

</select>

<button class="login-btn">
Continue
</button>

</form>

<div class="footer">
Football Training Tracker
</div>

</div>

</body>
</html>
