<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TrackPro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-YS6VaCU6uNW0C6c1zduDgPqhIiAj5GxNk4WliBN6v1iUYpqsHdb2Bz949jj44T7v" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-gradient d-flex align-items-center justify-content-center" style="height:100vh;">
<div class="card shadow-lg" style="width: 24rem; background: var(--card-bg); backdrop-filter: blur(20px); border:1px solid rgba(255,255,255,0.08);">
    <div class="card-body">
        <h3 class="card-title text-center mb-4" style="color: var(--text-light);">Sign in</h3>
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ category }}" role="alert">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}
        <form method="POST" action="/login">
            <div class="mb-3">
                <label for="username" class="form-label" style="color: var(--text-light);">Username</label>
                <select class="form-select" id="username" name="username">
                    <option>Akshit</option>
                    <option>Misha</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary w-100">Continue</button>
        </form>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-HoA7w/+jaPf+NyuKHS5F6I6yFrkwpadFr+Z+9V0c5q0WGl/8lFjHh+b2Fh+YBz+1" crossorigin="anonymous"></script>
</body>
</html>
